name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Local Sender" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "local_sender.app" 200 190 \
            --hide-extension "local_sender.app" \
            --app-drop-link 600 185 \
            "Local-Sender-${{ github.ref_name }}.dmg" \
            "build/macos/Build/Products/Release/local_sender.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: Local-Sender-${{ github.ref_name }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Rename EXE
        run: mv build/windows/runner/Release/local_sender.exe build/windows/runner/Release/Local-Sender-${{ github.ref_name }}.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/windows/runner/Release/Local-Sender-${{ github.ref_name }}.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build Linux app
        run: flutter build linux --release

      - name: Create Linux zip
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../Local-Sender-${{ github.ref_name }}-linux.zip .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: Local-Sender-${{ github.ref_name }}-linux.zip

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release

      - name: Create web zip
        run: |
          cd build/web
          zip -r ../../../Local-Sender-${{ github.ref_name }}-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: Local-Sender-${{ github.ref_name }}-web.zip

  release:
    needs: [build-android, build-macos, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: linux

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: web

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            Local-Sender-${{ github.ref_name }}.dmg
            Local-Sender-${{ github.ref_name }}.exe
            Local-Sender-${{ github.ref_name }}-linux.zip
            Local-Sender-${{ github.ref_name }}-web.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}