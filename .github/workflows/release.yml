  release:
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe

      # - name: Download Linux
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: linux

      # - name: Download Web
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: web

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            Local-Sender-${{ github.ref_name }}.dmg
            Local-Sender-${{ github.ref_name }}.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}