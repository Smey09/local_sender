name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Local Sender" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "local_sender.app" 200 190 \
            --hide-extension "local_sender.app" \
            --app-drop-link 600 185 \
            "Local-Sender-${{ github.ref_name }}.dmg" \
            "build/macos/Build/Products/Release/local_sender.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: Local-Sender-${{ github.ref_name }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Find and rename Windows EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build/windows -Filter *.exe -Recurse | Where-Object { $_.Name -match 'local_sender|local-sender|local_sender\.exe' } | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Contents of build/windows:" 
            Get-ChildItem -Path build/windows -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Windows EXE not found in build/windows"
          }
          $destination = Join-Path $exe.DirectoryName "Local-Sender-${{ github.ref_name }}.exe"
          Rename-Item -Path $exe.FullName -NewName $destination
          Write-Host "Renamed $($exe.FullName) to $destination"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/windows/**/Local-Sender-${{ github.ref_name }}.exe

