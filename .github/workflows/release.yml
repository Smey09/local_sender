name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Local Sender" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "local_sender.app" 200 190 \
            --hide-extension "local_sender.app" \
            --app-drop-link 600 185 \
            "Local-Sender-${{ github.ref_name }}.dmg" \
            "build/macos/Build/Products/Release/local_sender.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: Local-Sender-${{ github.ref_name }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create EXE installer
        run: |
          choco install innosetup
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"build\windows\runner\Release" /F"Local-Sender-${{ github.ref_name }}" installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/windows/runner/Release/Local-Sender-${{ github.ref_name }}.exe

  release:
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app-release.apk
            Local-Sender-${{ github.ref_name }}.dmg
            Local-Sender-${{ github.ref_name }}.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}